<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0D0C0B">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Agency Dashboard — StayOS</title>
<link rel="stylesheet" href="./css/base.css">
<link rel="stylesheet" href="./css/dashboard.css">
<style>
/* Agency-specific */
.portfolio-hero {
  background: var(--dark-bg);
  color: var(--dark-text);
  padding: var(--sp-8) var(--sp-6);
  border-radius: var(--r-md);
  margin-bottom: var(--sp-6);
  position: relative;
  overflow: hidden;
}

.portfolio-hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(var(--dark-border) 1px, transparent 1px),
    linear-gradient(90deg, var(--dark-border) 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.3;
  mask-image: radial-gradient(ellipse 100% 100% at 80% 50%, black 30%, transparent 100%);
}

.portfolio-hero-content { position: relative; z-index: 1; }

.portfolio-greeting {
  font-size: 0.6875rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--dark-text-3);
  margin-bottom: var(--sp-2);
}

.portfolio-name {
  font-family: var(--f-display);
  font-size: clamp(1.75rem, 3.5vw, 2.75rem);
  font-weight: 500;
  line-height: 1;
  letter-spacing: -0.02em;
  margin-bottom: var(--sp-4);
}

.portfolio-meta {
  display: flex;
  gap: var(--sp-6);
  flex-wrap: wrap;
}

.portfolio-meta-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.portfolio-meta-val {
  font-family: var(--f-mono);
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--dark-text);
}

.portfolio-meta-label {
  font-size: 0.6875rem;
  color: var(--dark-text-3);
  text-transform: uppercase;
  letter-spacing: 0.07em;
}

/* Property comparison cards */
.property-row {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: var(--sp-4);
  margin-bottom: var(--sp-6);
}

.prop-card {
  background: var(--light-surface);
  border: 1px solid var(--light-border);
  border-radius: var(--r-md);
  overflow: hidden;
  cursor: pointer;
  transition: var(--tr-base);
}

.prop-card:hover { box-shadow: var(--sh-md); transform: translateY(-1px); }

.prop-card-header {
  padding: var(--sp-4) var(--sp-5);
  border-bottom: 1px solid var(--light-border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--sp-3);
}

.prop-type-tag {
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 2px 6px;
  border-radius: var(--r-sm);
}

.prop-type-hotel   { background: var(--s-occupied-bg);   color: var(--s-occupied); }
.prop-type-student { background: var(--s-inspection-bg); color: var(--s-inspection); }

.prop-card-name {
  font-size: 0.9375rem;
  font-weight: 700;
  color: var(--light-text);
  letter-spacing: -0.01em;
  margin-bottom: 2px;
}

.prop-card-addr {
  font-size: 0.8125rem;
  color: var(--light-text-2);
}

.prop-card-metrics {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border-top: 1px solid var(--light-border);
}

.prop-metric {
  padding: var(--sp-4) var(--sp-4);
  border-right: 1px solid var(--light-border);
  text-align: center;
}
.prop-metric:last-child { border-right: none; }

.prop-metric-val {
  font-family: var(--f-mono);
  font-size: 1.125rem;
  font-weight: 600;
  color: var(--light-text);
  letter-spacing: -0.02em;
  line-height: 1;
  margin-bottom: 3px;
}

.prop-metric-label {
  font-size: 0.625rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--light-text-3);
}

/* Revenue chart bars */
.chart-container {
  background: var(--light-surface);
  border: 1px solid var(--light-border);
  border-radius: var(--r-md);
  padding: var(--sp-5);
  margin-bottom: var(--sp-4);
}

.chart-title {
  font-size: 0.9375rem;
  font-weight: 700;
  color: var(--light-text);
  letter-spacing: -0.01em;
  margin-bottom: var(--sp-5);
}

.bar-chart {
  display: flex;
  align-items: flex-end;
  gap: var(--sp-2);
  height: 120px;
  border-bottom: 1px solid var(--light-border);
  padding-bottom: 0;
}

.bar-group {
  flex: 1;
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 100%;
}

.bar {
  flex: 1;
  border-radius: 2px 2px 0 0;
  cursor: pointer;
  transition: filter 0.15s ease;
  min-height: 4px;
}
.bar:hover { filter: brightness(1.15); }

.chart-labels {
  display: flex;
  gap: var(--sp-2);
  margin-top: var(--sp-2);
}

.chart-label {
  flex: 1;
  font-size: 0.625rem;
  color: var(--light-text-3);
  text-align: center;
}

.chart-legend {
  display: flex;
  gap: var(--sp-4);
  margin-bottom: var(--sp-4);
  flex-wrap: wrap;
}

.legend-item-lg {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  font-size: 0.8125rem;
  color: var(--light-text-2);
}

.legend-swatch {
  width: 12px; height: 8px;
  border-radius: 1px;
}

/* Alert items */
.alert-item {
  display: flex;
  align-items: flex-start;
  gap: var(--sp-3);
  padding: var(--sp-4) var(--sp-5);
  border-bottom: 1px solid var(--light-border);
}
.alert-item:last-child { border-bottom: none; }

.alert-icon {
  width: 28px; height: 28px;
  border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.alert-icon-warning { background: var(--s-dirty-bg); color: var(--s-dirty); }
.alert-icon-info    { background: var(--s-occupied-bg); color: var(--s-occupied); }
.alert-icon-ok      { background: var(--s-available-bg); color: var(--s-available); }

/* Staff table avatar */
.staff-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--light-bg);
  border: 1px solid var(--light-border);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.6875rem; font-weight: 700;
  color: var(--light-text-2);
  flex-shrink: 0;
}

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-4); }
.three-col { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--sp-4); }

.stat-change-up   { color: var(--s-available); font-size: 0.75rem; }
.stat-change-down { color: var(--s-maintenance); font-size: 0.75rem; }

@media (max-width: 900px) {
  .property-row { grid-template-columns: 1fr; }
  .prop-card-metrics { grid-template-columns: repeat(2, 1fr); }
  .prop-metric:nth-child(2) { border-right: none; }
  .prop-metric:nth-child(3) { border-right: 1px solid var(--light-border); border-top: 1px solid var(--light-border); }
  .prop-metric:nth-child(4) { border-top: 1px solid var(--light-border); }
  .two-col, .three-col { grid-template-columns: 1fr; }
}

@media (max-width: 640px) {
  .portfolio-meta { gap: var(--sp-4); }
}
</style>
</head>
<body>

<div class="app-shell">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-mark">
        <svg viewBox="0 0 16 16" fill="none">
          <rect x="2" y="2" width="5" height="5" rx="0.5" fill="#fff" opacity="0.7"/>
          <rect x="9" y="2" width="5" height="5" rx="0.5" fill="#fff"/>
          <rect x="2" y="9" width="5" height="5" rx="0.5" fill="#fff"/>
          <rect x="9" y="9" width="5" height="5" rx="0.5" fill="#fff" opacity="0.5"/>
        </svg>
      </div>
      <div>
        <div class="sidebar-logo-text">StayOS</div>
        <div class="sidebar-logo-sub">Agency Portal</div>
      </div>
    </div>

    <div class="sidebar-property" style="display:flex;justify-content:space-between;align-items:center;">
      <div>
        <div class="sidebar-property-name">Sunrise Property Group</div>
        <div class="sidebar-property-type">Agency · 2 properties</div>
      </div>
      <div class="sidebar-property-arrow"><svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4l4 4-4 4"/></svg></div>
    </div>

    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Portfolio</div>
      <a class="sidebar-link active" data-tab="portfolio" onclick="switchTab('portfolio')">
        <span class="sidebar-link-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="5" height="5" rx="0.5"/><rect x="9" y="2" width="5" height="5" rx="0.5"/><rect x="2" y="9" width="5" height="5" rx="0.5"/><rect x="9" y="9" width="5" height="5" rx="0.5"/></svg></span>
        <span>Overview</span>
      </a>
      <a class="sidebar-link" data-tab="properties" onclick="switchTab('properties')">
        <span class="sidebar-link-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="12" height="12" rx="1"/><path d="M6 6h1M9 6h1M6 9h1M9 9h1M6 12h4"/></svg></span>
        <span>Properties</span>
      </a>
      <a class="sidebar-link" data-tab="analytics" onclick="switchTab('analytics')">
        <span class="sidebar-link-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 13h12"/><path d="M5 13V7"/><path d="M9 13V4"/><path d="M13 13V9"/></svg></span>
        <span>Analytics</span>
      </a>
      <div class="sidebar-section-label" style="margin-top:var(--sp-2);">Management</div>
      <a class="sidebar-link" data-tab="staff" onclick="switchTab('staff')">
        <span class="sidebar-link-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="5" r="2.5"/><path d="M1 14c0-2.8 2.2-5 5-5s5 2.2 5 5"/><circle cx="12" cy="5" r="1.5"/><path d="M11 14h4c0-2.2-1.3-4-3-4.5"/></svg></span>
        <span>Staff</span>
      </a>
      <a class="sidebar-link" data-tab="billing" onclick="switchTab('billing')">
        <span class="sidebar-link-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="10" height="8" rx="1"/><path d="M5 5V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1"/><path d="M5 9h6"/></svg></span>
        <span>Billing</span>
      </a>
      <div class="sidebar-section-label" style="margin-top:var(--sp-2);">Navigation</div>
      <a class="sidebar-link" href="./property.html">
        <span class="sidebar-link-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7L8 2l6 5"/><path d="M4 7v7h8V7"/><path d="M6 14v-4h4v4"/></svg></span>
        <span>Property Portal</span>
      </a>
      <a class="sidebar-link" href="./index.html">
        <span class="sidebar-link-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3H3a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h3M11 5l3 3-3 3M7 8h7"/></svg></span>
        <span>Back to Site</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar">AB</div>
        <div>
          <div class="sidebar-user-name">Amanda Botha</div>
          <div class="sidebar-user-role">Agency Owner</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- ── Main Content ── -->
  <main class="main-content">
    <div class="topbar">
      <div>
        <div class="topbar-title" id="topbarTitle">Portfolio Overview</div>
        <div class="topbar-date">Sat, 20 Jun 2026 · Sunrise Property Group</div>
      </div>
      <div class="topbar-actions">
        <div class="topbar-icon-btn" onclick="agencyToast('Notifications opened','info')">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2a4 4 0 0 1 4 4v3l1.5 2.5h-11L4 9V6a4 4 0 0 1 4-4z"/><path d="M6.5 13.5a1.5 1.5 0 0 0 3 0"/></svg>
          <span class="topbar-notif-dot"></span>
        </div>
        <button class="btn btn-accent btn-sm" onclick="agencyToast('Add property workflow launched','info')">+ Add Property</button>
      </div>
    </div>

    <div class="page-content" id="pageContent"></div>
  </main>
</div>

<!-- Toast -->
<div id="agToast" style="position:fixed;bottom:calc(var(--sp-6) + env(safe-area-inset-bottom));right:var(--sp-6);z-index:900;transform:translateY(80px);opacity:0;transition:all 0.3s ease;pointer-events:none;">
  <div style="background:var(--light-text);color:var(--light-bg);padding:12px 20px;border-radius:var(--r-md);font-size:0.875rem;font-weight:500;box-shadow:var(--sh-lg);display:flex;align-items:center;gap:var(--sp-3);max-width:320px;" id="agToastInner"></div>
</div>

<script src="./js/data.js"></script>
<script src="./js/agency.js"></script>
</body>
</html>
